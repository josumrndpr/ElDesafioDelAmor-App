<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#D32F2F">
  <meta name="description" content="El Desafío del Amor — 40 días para transformar tu relación">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">

  <title>El Desafío del Amor</title>

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css?v=2">
  <link rel="stylesheet" href="css/reset.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=5">
  <link rel="stylesheet" href="css/animations.css?v=3">
  <link rel="stylesheet" href="css/pages.css?v=6">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon-192.svg">

  <style>
    /* Critical inline styles for first paint */
    .app-shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: var(--top-bar-height);
      padding-bottom: calc(var(--bottom-nav-height) + var(--safe-bottom));
    }
    #app-content {
      flex: 1;
      width: 100%;
      max-width: var(--max-content-width);
      margin: 0 auto;
      padding: var(--sp-1) var(--sp-4) var(--sp-6);
    }
    @media (min-width: 768px) {
      #app-content {
        max-width: var(--max-desktop-width);
        padding: var(--sp-2) var(--sp-6) var(--sp-8);
      }
    }
  </style>
</head>
<body>

  <!-- TOP APP BAR -->
  <header class="top-app-bar" role="banner">
    <div class="top-app-bar__brand">
      <svg class="top-app-bar__logo" viewBox="0 0 40 40" fill="none">
        <path d="M20 36.7l-2.1-1.9C8.4 26 4 22 4 17 4 13 7 10 11 10c3 0 5.5 1.5 7 3.5C19.5 11.5 22 10 25 10c4 0 7 3 7 7 0 5-4.4 9-13.9 17.8L20 36.7z" fill="#E91E63"/>
        <path d="M20 34.3l-1.7-1.6C9 24.7 5 21 5 16.5 5 13 7.5 10.5 11 10.5c2.5 0 4.5 1.2 6 3 1.5-1.8 3.5-3 6-3 3.5 0 6 2.5 6 6 0 4.5-4 8.2-13.3 16.2L20 34.3z" fill="#F8BBD0"/>
      </svg>
      <span class="top-app-bar__title">Desafío</span>
    </div>
    <div class="top-app-bar__actions">
      <button id="theme-toggle" class="icon-btn" aria-label="Cambiar tema">
        <span class="ripple"></span>
      </button>
    </div>
  </header>

  <!-- APP SHELL -->
  <div class="app-shell">
    <main id="app-content" role="main">
      <!-- Views render here dynamically -->
    </main>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <nav class="bottom-nav" role="navigation" aria-label="Navegación principal">
    <button class="bottom-nav__item active" data-route="home" aria-label="Inicio">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Inicio</span>
    </button>
    <button class="bottom-nav__item" data-route="progress" aria-label="Progreso">
      <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h7v7H3v-7zm11 0h7v7h-7v-7z"/></svg>
      <span>Progreso</span>
    </button>
    <button class="bottom-nav__item" data-route="journal" aria-label="Diario">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      <span>Diario</span>
    </button>
  </nav>

  <!-- FAB (future: escribir nota) -->
  <button class="fab" id="fab-main" aria-label="Abrir día actual" style="display:none;">
    <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
  </button>

  <!-- Scripts (load order matters) -->
  <script src="js/ui.js?v=3"></script>
  <script src="js/store.js?v=4"></script>
  <script src="js/data.js?v=2"></script>
  <script src="js/theme.js?v=2"></script>
  <script src="js/router.js?v=3"></script>
  <script src="js/confetti.js?v=2"></script>
  <script src="js/day-view.js?v=4"></script>
  <script src="js/journal.js?v=6"></script>
  <script src="js/stats-view.js?v=2"></script>
  <script src="js/sounds.js?v=1"></script>
  <script src="js/app.js?v=7"></script>

  <!-- Service Worker registration + Install prompt -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // Capturar beforeinstallprompt para forzar instalación
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('✅ PWA listo para instalar');
    });
  </script>
</body>
</html>
